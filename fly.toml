# fly.toml app configuration file generated for loopforge-said on 2026-07-16T12:51:30+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'loopforge-said'
primary_region = 'cdg'

[build]
[http_service]
  internal_port = 8123
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
